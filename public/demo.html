<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Plans | Premium Content</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 1.25rem;
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto;
        }

        .pricing-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
            animation: fadeInUp 1s ease-out;
        }

        .pricing-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pricing-card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .pricing-card.popular {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .popular-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .plan-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .plan-price {
            font-size: 3rem;
            font-weight: 700;
            margin: 1.5rem 0;
        }

        .plan-price span {
            font-size: 1rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        .features {
            list-style: none;
            margin: 2rem 0;
            text-align: left;
        }

        .features li {
            margin-bottom: 1rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
        }

        .features li::before {
            content: '✓';
            color: var(--accent);
            margin-right: 12px;
            font-weight: 700;
        }

        .btn-select {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-select:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        /* Modal / Payment Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            display: flex;
            opacity: 1;
        }

        .payment-modal {
            background: #1e293b;
            padding: 3rem;
            border-radius: 32px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .overlay.active .payment-modal {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .qr-placeholder {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            margin: 2rem auto;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .qr-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .amount-display {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .dot-flashing {
            position: relative;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: var(--accent);
            color: var(--accent);
            animation: dotFlashing 1s infinite linear alternate;
            display: inline-block;
            margin: 0 15px;
        }

        @keyframes dotFlashing {
            0% {
                background-color: var(--accent);
            }

            50%,
            100% {
                background-color: rgba(16, 185, 129, 0.2);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 968px) {
            .pricing-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Unlock Premium Access</h1>
        <p>Choose the perfect plan to access exclusive content and advanced features.</p>
    </div>

    <!-- Login Section -->
    <div id="loginSection"
        style="max-width: 400px; margin: 0 auto 3rem auto; padding: 2rem; background: rgba(255,255,255,0.05); border-radius: 12px; backdrop-filter: blur(10px);">
        <h3 style="margin-bottom: 1.5rem; text-align: center; color: white;">Login to Subscribe</h3>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <input type="email" id="loginEmail" placeholder="Email"
                style="padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 1rem;">
            <input type="password" id="loginPassword" placeholder="Password"
                style="padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 1rem;">
            <button onclick="handleLogin()"
                style="padding: 0.75rem; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s;">Login</button>
            <p id="loginStatus" style="text-align: center; font-size: 0.9rem; margin: 0; color: var(--text-dim);"></p>
        </div>
    </div>

    <!-- User Info (shown after login) -->
    <div id="userInfo"
        style="display: none; max-width: 400px; margin: 0 auto 3rem auto; padding: 1.5rem; background: rgba(16, 185, 129, 0.1); border-radius: 12px; text-align: center;">
        <p style="margin: 0; color: var(--accent); font-weight: 600;">✓ Logged in as <span id="userEmail"></span></p>
        <button onclick="handleLogout()"
            style="margin-top: 1rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 6px; cursor: pointer;">Logout</button>
    </div>

    <div class="pricing-container">
        <!-- Plans will be loaded dynamically here -->
        <div style="grid-column: 1 / -1; text-align: center; padding: 2rem;">
            <p style="color: var(--text-dim);">Loading subscription plans...</p>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentOverlay" class="overlay">
        <div class="payment-modal">
            <button class="close-modal" onclick="closePayment()">&times;</button>
            <h2 id="modalTitle">Scan to Pay</h2>
            <p id="modalPlan" style="color: var(--text-dim); margin-top: 0.5rem;"></p>

            <div class="qr-placeholder" id="qrContainer">
                <!-- QR Code will be here -->
                <img id="qrImage" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=SamplePayment"
                    alt="Bakong QR">
            </div>

            <div class="amount-display" id="modalAmount">$0.00</div>
            <div class="status-badge">
                <span class="dot-flashing"></span>
                Waiting for payment...
            </div>
            <p style="margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-dim);">
                Scan this QR code using your Bakong app to complete the subscription.
            </p>
        </div>
    </div>

    <script>
        // Check if user is already logged in
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            const email = localStorage.getItem('user_email');

            if (token && email) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('userEmail').textContent = email;
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const statusEl = document.getElementById('loginStatus');

            if (!email || !password) {
                statusEl.textContent = 'Please enter email and password';
                statusEl.style.color = '#ef4444';
                return;
            }

            statusEl.textContent = 'Logging in...';
            statusEl.style.color = 'var(--text-dim)';

            try {
                console.log('Login attempt:', { email, password: '***' });

                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok && data.data && data.data.status) {
                    // Store token and user info
                    localStorage.setItem('access_token', data.data.token);
                    localStorage.setItem('user_email', data.data.user.email);

                    // Also store refresh token if needed
                    if (data.data.refresh_token) {
                        localStorage.setItem('refresh_token', data.data.refresh_token);
                    }

                    statusEl.textContent = 'Login successful!';
                    statusEl.style.color = 'var(--accent)';

                    setTimeout(() => {
                        checkAuth();
                        document.getElementById('loginEmail').value = '';
                        document.getElementById('loginPassword').value = '';
                        statusEl.textContent = '';
                    }, 1000);
                } else {
                    // Show detailed error
                    const errorMsg = data.message || 'Login failed';
                    const errorDetails = data.errors ? JSON.stringify(data.errors) : '';
                    statusEl.textContent = errorMsg + (errorDetails ? ': ' + errorDetails : '');
                    statusEl.style.color = '#ef4444';
                    console.error('Login failed:', data);
                }
            } catch (error) {
                console.error('Login error:', error);
                statusEl.textContent = 'Login error: ' + error.message;
                statusEl.style.color = '#ef4444';
            }
        }

        function handleLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_email');
            checkAuth();
        }

        async function fetchPlans() {
            try {
                const response = await fetch('/api/v1/subscription-plans');
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`HTTP ${response.status}: ${text.substring(0, 50)}...`);
                }
                const data = await response.json();
                if (data.status === 'success') {
                    renderPlans(data.data);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                document.querySelector('.pricing-container').innerHTML =
                    `<div style="grid-column: 1 / -1; text-align: center; color: #ef4444;">
                        <p>Failed to load plans. Please check your connection or API route.</p>
                        <p style="font-size: 0.8rem; margin-top: 0.5rem;">Error: ${error.message}</p>
                        <button onclick="fetchPlans()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer;">Retry</button>
                     </div>`;
            }
        }

        function renderPlans(plans) {
            const container = document.querySelector('.pricing-container');
            container.innerHTML = '';

            plans.forEach((plan, index) => {
                const isFree = parseFloat(plan.price) === 0 || plan.name.toLowerCase().includes('free');
                const isPopular = plan.name.toLowerCase().includes('premium') || plan.name.toLowerCase().includes('pro');

                const card = document.createElement('div');
                card.className = `pricing-card ${isPopular ? 'popular' : ''} ${isFree ? 'free-plan' : ''}`;

                card.innerHTML = `
                    ${isPopular ? '<div class="popular-badge">MOST POPULAR</div>' : ''}
                    <div>
                        <h3 class="plan-name">${plan.name}</h3>
                        <div class="plan-price">
                            ${isFree ? 'FREE' : '$' + parseFloat(plan.price).toFixed(2)}
                            ${isFree ? '' : `<span>/${plan.interval}</span>`}
                        </div>
                        <ul class="features">
                            <li>Access to ${plan.name} content</li>
                            <li>${plan.currency} Currency</li>
                            <li>24/7 Support</li>
                        </ul>
                    </div>
                    ${isFree
                        ? `<button class="btn-select" style="background: #334155; cursor: default;">Current Plan</button>`
                        : `<button class="btn-select" onclick="openPayment('${plan.name}', ${plan.price}, ${plan.id})">Select Plan</button>`
                    }
                `;
                container.appendChild(card);
            });
        }

        async function openPayment(planName, price, planId) {
            try {
                // Show loading state
                document.getElementById('modalTitle').innerText = 'Generating Payment...';
                document.getElementById('modalPlan').innerText = 'Please wait...';
                document.getElementById('modalAmount').innerText = '$' + parseFloat(price).toFixed(2);
                document.getElementById('qrImage').src = '';
                document.getElementById('paymentOverlay').classList.add('active');

                // Call subscribe API to get real QR code
                const token = localStorage.getItem('access_token');
                if (!token) {
                    alert('Please login first to subscribe');
                    closePayment();
                    return;
                }

                const subscribeResponse = await fetch(`/api/v1/user-subscription/subscribe/${planId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                if (!subscribeResponse.ok) {
                    const errorData = await subscribeResponse.json();
                    throw new Error(errorData.message || 'Failed to create subscription');
                }

                const subscribeData = await subscribeResponse.json();

                if (subscribeData.status !== 'success') {
                    throw new Error(subscribeData.message || 'Subscription failed');
                }

                const { qr, payment_id, deeplink } = subscribeData.data;

                // Update modal with real QR code
                document.getElementById('modalTitle').innerText = 'Pay for ' + planName;
                document.getElementById('modalPlan').innerText = 'Payment ID: ' + payment_id;

                // Generate QR code image from the QR string
                const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qr)}`;
                document.getElementById('qrImage').src = qrImageUrl;

                console.log('QR Code generated:', { qr, deeplink, payment_id });

                // Start polling payment status
                let statusWord = 'PLUS';
                if (planName.toLowerCase() === 'premium') {
                    statusWord = 'PRO';
                }

                pollPaymentStatus(payment_id, planName, statusWord, token);

            } catch (error) {
                console.error('Payment error:', error);
                alert('Error: ' + error.message);
                closePayment();
            }
        }

        async function pollPaymentStatus(paymentId, planName, statusWord, token) {
            const maxAttempts = 60; // Poll for 5 minutes (60 * 5 seconds)
            let attempts = 0;

            const pollInterval = setInterval(async () => {
                attempts++;

                try {
                    const statusResponse = await fetch(`/api/v1/payment/checkPaymentStatus/${paymentId}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/json'
                        }
                    });

                    if (!statusResponse.ok) {
                        throw new Error('Failed to check payment status');
                    }

                    const statusData = await statusResponse.json();

                    if (statusData.status === 'success' && statusData.data) {
                        const responseCode = statusData.data.responseCode;

                        if (responseCode === 0) {
                            // Payment successful!
                            clearInterval(pollInterval);

                            const badge = document.querySelector('.status-badge');
                            badge.innerHTML = `✓ ${statusWord} ACTIVATED!`;
                            badge.style.background = 'var(--accent)';
                            badge.style.color = 'white';

                            document.getElementById('modalTitle').innerHTML = `<span style="color: var(--accent)">WELCOME TO ${statusWord}</span>`;

                            setTimeout(() => {
                                closePayment();
                                alert(`Welcome to ${planName}! You are now a ${statusWord} member.`);
                                location.reload(); // Reload to update UI
                            }, 2500);
                        } else if (responseCode !== 1) {
                            // Payment failed (not pending)
                            clearInterval(pollInterval);
                            alert('Payment failed. Please try again.');
                            closePayment();
                        }
                        // If responseCode === 1, continue polling (pending)
                    }

                    if (attempts >= maxAttempts) {
                        clearInterval(pollInterval);
                        alert('Payment timeout. Please check your payment status later.');
                        closePayment();
                    }

                } catch (error) {
                    console.error('Status check error:', error);
                    // Continue polling even on error
                }
            }, 5000); // Poll every 5 seconds
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            fetchPlans();
        });

        function closePayment() {
            document.getElementById('paymentOverlay').classList.remove('active');
            // Reset status badge for next time
            const badge = document.querySelector('.status-badge');
            badge.innerHTML = '<span class="dot-flashing"></span> Waiting for payment...';
            badge.style.background = 'rgba(16, 185, 129, 0.1)';
        }

        // Close on backdrop click
        document.getElementById('paymentOverlay').addEventListener('click', function (e) {
            if (e.target === this) closePayment();
        });
    </script>
</body>

</html>
